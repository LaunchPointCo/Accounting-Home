<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting Cash Budget Calculator</title>
  
  <style>
    /* Hide HTML5 number input spin buttons to prevent overlap with % signs */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Inline SVG Icons
    const CalculatorIcon = ({ className = "", size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect width="16" height="20" x="4" y="2" rx="2"/>
        <line x1="8" x2="16" y1="6" y2="6"/>
        <line x1="16" x2="16" y1="14" y2="18"/>
        <path d="M16 10h.01"/>
        <path d="M12 10h.01"/>
        <path d="M8 10h.01"/>
        <path d="M12 14h.01"/>
        <path d="M8 14h.01"/>
        <path d="M12 18h.01"/>
        <path d="M8 18h.01"/>
      </svg>
    );

    const RotateCcwIcon = ({ className = "", size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    );

    const InfoIcon = ({ className = "", size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4"/>
        <path d="M12 8h.01"/>
      </svg>
    );

    const ArrowRightIcon = ({ className = "", size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M5 12h14"/>
        <path d="m12 5 7 7-7 7"/>
      </svg>
    );

    const INITIAL_STATE = {
      // A. Production & Sales
      unitsProduced: '',
      unitsSold: '',
      salesPrice: '',
      creditSalesPercent: '',
      cashSalesPercent: '',
      creditCollectedCurrentPercent: '',
      creditCollectedLaterPercent: '',
      
      // B. Variable Costs
      dmPerUnit: '',
      dlPerUnit: '',
      imPerUnit: '',
      commPerUnit: '',
      vcPaidCurrentPercent: '',
      vcPaidLaterPercent: '',

      // C. Fixed Costs
      mfgSalaries: '',
      rentAndIns: '',
      machineryDepr: '',
      financeSalaries: '',
      advertising: '',

      // D. Dividends
      dividendsPaid: '',

      // E. Cash & Financing
      begCashBalance: '',
      minCashRequired: '',
      annualInterestRatePercent: '',
      borrowingIncrement: ''
    };

    function App() {
      const [inputs, setInputs] = useState(INITIAL_STATE);
      const [results, setResults] = useState({});

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setInputs(prev => ({
          ...prev,
          [name]: value === '' ? '' : parseFloat(value)
        }));
      };

      const resetToDefault = () => {
        setInputs(INITIAL_STATE);
      };

      useEffect(() => {
        calculateResults();
      }, [inputs]);

      const calculateResults = () => {
        // Convert all inputs to safe numbers for calculation (defaulting empty strings to 0)
        const vals = Object.keys(inputs).reduce((acc, key) => {
          acc[key] = Number(inputs[key]) || 0;
          return acc;
        }, {});

        // --- Step 1: Sales & Receipts ---
        const totalSales = vals.unitsSold * vals.salesPrice;
        const cashSales = totalSales * (vals.cashSalesPercent / 100);
        const creditSales = totalSales * (vals.creditSalesPercent / 100);
        const creditCollectedCurrent = creditSales * (vals.creditCollectedCurrentPercent / 100);
        
        const q42_cashReceipts = cashSales + creditCollectedCurrent;
        const q43_availableCash = vals.begCashBalance + q42_cashReceipts;

        // --- Step 2: Variable Disbursements ---
        // Note: Production costs are based on units PRODUCED. Commissions are based on units SOLD.
        const productionVCPerUnit = vals.dmPerUnit + vals.dlPerUnit + vals.imPerUnit;
        const totalProductionVCIncurred = productionVCPerUnit * vals.unitsProduced;
        const totalSellingVCIncurred = vals.commPerUnit * vals.unitsSold;
        
        const totalVCIncurred = totalProductionVCIncurred + totalSellingVCIncurred;
        const q44_varCashDisbursements = totalVCIncurred * (vals.vcPaidCurrentPercent / 100);

        // --- Step 3: Fixed Disbursements ---
        const fixedCashCosts = vals.mfgSalaries + vals.rentAndIns + vals.financeSalaries + vals.advertising;
        const q45_totalCashDisbursements = q44_varCashDisbursements + fixedCashCosts + vals.dividendsPaid;

        // --- Step 4: Ending Cash & Financing ---
        const q46_endingCashBeforeFinancing = q43_availableCash - q45_totalCashDisbursements;
        
        let q47_financingReqNoInterest = 0;
        if (q46_endingCashBeforeFinancing < vals.minCashRequired) {
          q47_financingReqNoInterest = vals.minCashRequired - q46_endingCashBeforeFinancing;
        }

        const monthlyInterestRate = (vals.annualInterestRatePercent / 100) / 12;
        const q48_interestCostOnQ47 = q47_financingReqNoInterest * monthlyInterestRate;

        // Q49 Calculation (Increments with interest coverage)
        let q49_financingNeeded = 0;
        let actualInterestPaid = 0;
        if (q46_endingCashBeforeFinancing < vals.minCashRequired && vals.borrowingIncrement > 0) {
          const deficiency = vals.minCashRequired - q46_endingCashBeforeFinancing;
          const netCashPerIncrement = vals.borrowingIncrement - (vals.borrowingIncrement * monthlyInterestRate);
          const incrementsNeeded = Math.ceil(deficiency / netCashPerIncrement);
          q49_financingNeeded = incrementsNeeded * vals.borrowingIncrement;
          actualInterestPaid = q49_financingNeeded * monthlyInterestRate;
        }

        // --- Step 5: Net Cash Flow & Net Income ---
        const q50_netCashFlow = q42_cashReceipts - q45_totalCashDisbursements; // Before financing

        // Variable Costing Net Income
        const cogsVar = productionVCPerUnit * vals.unitsSold; // Expense is based on SOLD
        const varSellingExp = totalSellingVCIncurred; // Already based on SOLD
        const totalVarExpenses = cogsVar + varSellingExp;
        const contributionMargin = totalSales - totalVarExpenses;
        
        const totalFixedExpenses = fixedCashCosts + vals.machineryDepr; // Include depreciation!
        const q51_netIncome = contributionMargin - totalFixedExpenses;

        setResults({
          totalSales, cashSales, creditSales, creditCollectedCurrent,
          totalProductionVCIncurred, totalSellingVCIncurred, totalVCIncurred, fixedCashCosts,
          q42_cashReceipts, q43_availableCash, q44_varCashDisbursements, q45_totalCashDisbursements,
          q46_endingCashBeforeFinancing, q47_financingReqNoInterest, q48_interestCostOnQ47,
          q49_financingNeeded, actualInterestPaid, q50_netCashFlow, q51_netIncome,
          totalVarExpenses, totalFixedExpenses
        });
      };

      const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val || 0);

      // Grouped Input Field Component
      const InputRow = ({ label, name, isPercent = false }) => (
        <div className="flex items-center justify-between py-1.5">
          <label className="text-sm font-medium text-gray-700">{label}</label>
          <div className="relative">
            {!isPercent && <span className="absolute left-2 top-2 text-blue-500 font-semibold">$</span>}
            <input
              type="number"
              name={name}
              value={inputs[name]}
              onChange={handleInputChange}
              className={`w-28 pl-${!isPercent ? '6' : '3'} ${isPercent ? 'pr-7' : 'pr-3'} py-1.5 border-2 border-blue-300 bg-blue-50/30 rounded-md shadow-[0_0_8px_rgba(59,130,246,0.3)] outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-right text-sm font-semibold text-blue-900 transition-all`}
            />
            {isPercent && <span className="absolute right-2 top-2 text-blue-500 font-semibold">%</span>}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
          <div className="max-w-7xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="flex justify-between items-end bg-white p-6 rounded-xl shadow-sm border border-gray-100">
              <div>
                <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                  <CalculatorIcon className="text-blue-600" size={32}/>
                  Cash Budget & CVP Calculator
                </h1>
                <p className="text-gray-500 mt-2">Enter your problem variables on the left, get detailed answers on the right.</p>
              </div>
              <button 
                onClick={resetToDefault}
                className="flex items-center gap-2 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 px-4 rounded-lg transition-colors"
              >
                <RotateCcwIcon size={16} /> Clear All Inputs
              </button>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              
              {/* LEFT PANEL: INPUTS */}
              <div className="lg:col-span-5 space-y-6">
                
                {/* Sec A: Production & Sales */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-lg text-slate-800 mb-4 border-b pb-2">A. Production & Sales</h3>
                  <InputRow label="Units Produced" name="unitsProduced" isPercent={true} />
                  <InputRow label="Units Sold" name="unitsSold" isPercent={true} />
                  <InputRow label="Sales Price per Unit" name="salesPrice" />
                  <div className="grid grid-cols-2 gap-4 mt-3 pt-3 border-t border-gray-50">
                    <InputRow label="Credit Sales" name="creditSalesPercent" isPercent={true} />
                    <InputRow label="Cash Sales" name="cashSalesPercent" isPercent={true} />
                    <InputRow label="Credit Col. (Current)" name="creditCollectedCurrentPercent" isPercent={true} />
                    <InputRow label="Credit Col. (Later)" name="creditCollectedLaterPercent" isPercent={true} />
                  </div>
                </div>

                {/* Sec B: Variable Costs */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-lg text-slate-800 mb-4 border-b pb-2">B. Variable Costs (Per Unit)</h3>
                  <InputRow label="Direct Material" name="dmPerUnit" />
                  <InputRow label="Direct Labor" name="dlPerUnit" />
                  <InputRow label="Indirect Materials" name="imPerUnit" />
                  <InputRow label="Sales Commissions" name="commPerUnit" />
                  <div className="grid grid-cols-2 gap-4 mt-3 pt-3 border-t border-gray-50">
                    <InputRow label="% Paid Current Mo." name="vcPaidCurrentPercent" isPercent={true} />
                    <InputRow label="% Paid Later" name="vcPaidLaterPercent" isPercent={true} />
                  </div>
                </div>

                {/* Sec C & D: Fixed Costs & Dividends */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-lg text-slate-800 mb-4 border-b pb-2">C & D. Fixed Costs & Dividends</h3>
                  <InputRow label="Manufacturing Salaries" name="mfgSalaries" />
                  <InputRow label="Factory Rent & Insurance" name="rentAndIns" />
                  <InputRow label="Machinery Depreciation" name="machineryDepr" />
                  <InputRow label="Finance/Mgmt Salaries" name="financeSalaries" />
                  <InputRow label="Advertising Costs" name="advertising" />
                  <div className="mt-3 pt-3 border-t border-gray-50">
                    <InputRow label="Dividends Paid" name="dividendsPaid" />
                  </div>
                </div>

                {/* Sec E: Cash & Financing */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                  <h3 className="font-semibold text-lg text-slate-800 mb-4 border-b pb-2">E. Cash & Financing Settings</h3>
                  <InputRow label="Beginning Cash Balance" name="begCashBalance" />
                  <InputRow label="Minimum Cash Required" name="minCashRequired" />
                  <div className="grid grid-cols-2 gap-4 mt-3 pt-3 border-t border-gray-50">
                    <InputRow label="Annual Interest %" name="annualInterestRatePercent" isPercent={true} />
                    <InputRow label="Borrowing Increments" name="borrowingIncrement" />
                  </div>
                </div>

              </div>

              {/* RIGHT PANEL: OUTPUTS (QUESTIONS 42-52) */}
              <div className="lg:col-span-7 bg-white rounded-xl shadow-lg border border-blue-100 p-6">
                <h2 className="text-2xl font-bold text-blue-900 mb-6 flex items-center gap-2">
                  <InfoIcon className="text-blue-500" /> Answers & Computations
                </h2>

                <div className="space-y-5">
                  {/* Q42 */}
                  <div className="p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <div className="flex justify-between items-start">
                      <h4 className="font-bold text-slate-800">42) Budgeted Cash Receipts</h4>
                      <span className="text-xl font-bold text-blue-700">{formatCurrency(results.q42_cashReceipts)}</span>
                    </div>
                    <p className="text-sm text-slate-600 mt-2">
                      <strong>Work:</strong> Cash Sales {formatCurrency(results.cashSales)} + Credit Collections {formatCurrency(results.creditCollectedCurrent)}
                    </p>
                  </div>

                  {/* Q43 */}
                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <div className="flex justify-between items-start">
                      <h4 className="font-bold text-slate-800">43) Budgeted Available Cash</h4>
                      <span className="text-xl font-bold text-slate-700">{formatCurrency(results.q43_availableCash)}</span>
                    </div>
                    <p className="text-sm text-slate-600 mt-2">
                      <strong>Work:</strong> Beg Cash {formatCurrency(inputs.begCashBalance)} + Receipts {formatCurrency(results.q42_cashReceipts)}
                    </p>
                  </div>

                  {/* Q44 */}
                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <div className="flex justify-between items-start">
                      <h4 className="font-bold text-slate-800">44) Variable Cash Disbursements</h4>
                      <span className="text-xl font-bold text-slate-700">{formatCurrency(results.q44_varCashDisbursements)}</span>
                    </div>
                    <p className="text-sm text-slate-600 mt-2">
                      <strong>Work:</strong> Total VC Incurred {formatCurrency(results.totalVCIncurred)} × {inputs.vcPaidCurrentPercent}% <br/>
                      <em>(Production VC: {formatCurrency(results.totalProductionVCIncurred)} based on units PRODUCED. Selling VC: {formatCurrency(results.totalSellingVCIncurred)} based on units SOLD.)</em>
                    </p>
                  </div>

                  {/* Q45 */}
                  <div className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <div className="flex justify-between items-start">
                      <h4 className="font-bold text-slate-800">45) Total Cash Disbursements</h4>
                      <span className="text-xl font-bold text-slate-700">{formatCurrency(results.q45_totalCashDisbursements)}</span>
                    </div>
                    <p className="text-sm text-slate-600 mt-2">
                      <strong>Work:</strong> Var Disb {formatCurrency(results.q44_varCashDisbursements)} + Fixed Cash Costs {formatCurrency(results.fixedCashCosts)} + Dividends {formatCurrency(inputs.dividendsPaid)}<br/>
                      <em>(Note: Depreciation of {formatCurrency(inputs.machineryDepr)} is excluded because it's non-cash).</em>
                    </p>
                  </div>

                  {/* Q46 */}
                  <div className={`p-4 rounded-lg border ${results.q46_endingCashBeforeFinancing < 0 ? 'bg-red-50 border-red-100' : 'bg-green-50 border-green-100'}`}>
                    <div className="flex justify-between items-start">
                      <h4 className="font-bold text-slate-800">46) Cash Balance Before Financing</h4>
                      <span className={`text-xl font-bold ${results.q46_endingCashBeforeFinancing < 0 ? 'text-red-600' : 'text-green-600'}`}>
                        {formatCurrency(results.q46_endingCashBeforeFinancing)}
                      </span>
                    </div>
                    <p className="text-sm text-slate-600 mt-2">
                      <strong>Work:</strong> Available Cash {formatCurrency(results.q43_availableCash)} - Total Disbursements {formatCurrency(results.q45_totalCashDisbursements)}
                    </p>
                  </div>

                  {/* Q47 & 48 */}
                  <div className="grid grid-cols-2 gap-4">
                    <div className="p-4 bg-amber-50 rounded-lg border border-amber-100">
                      <h4 className="font-bold text-slate-800 mb-1">47) Financing Req. (No Interest)</h4>
                      <span className="text-lg font-bold text-amber-700">{formatCurrency(results.q47_financingReqNoInterest)}</span>
                      <p className="text-xs text-slate-600 mt-1">Min. required - Ending cash</p>
                    </div>
                    <div className="p-4 bg-amber-50 rounded-lg border border-amber-100">
                      <h4 className="font-bold text-slate-800 mb-1">48) Cost of Interest (1 Mo)</h4>
                      <span className="text-lg font-bold text-amber-700">{formatCurrency(results.q48_interestCostOnQ47)}</span>
                      <p className="text-xs text-slate-600 mt-1">On exact deficiency amount</p>
                    </div>
                  </div>

                  {/* Q49 */}
                  <div className="p-4 bg-orange-50 rounded-lg border border-orange-200">
                    <div className="flex justify-between items-start">
                      <h4 className="font-bold text-slate-800">49) Financing Needed (Inc. Interest)</h4>
                      <span className="text-xl font-bold text-orange-600">{formatCurrency(results.q49_financingNeeded)}</span>
                    </div>
                    <p className="text-sm text-slate-600 mt-2">
                      <strong>Work:</strong> Borrowed in {formatCurrency(inputs.borrowingIncrement)} increments to cover the {formatCurrency(results.q47_financingReqNoInterest)} deficiency PLUS the {formatCurrency(results.actualInterestPaid)} interest payment.
                    </p>
                  </div>

                  {/* Q50 & 51 */}
                  <div className="grid grid-cols-2 gap-4">
                    <div className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                      <h4 className="font-bold text-slate-800 mb-1">50) Budgeted Net Cash Flow</h4>
                      <span className={`text-lg font-bold ${results.q50_netCashFlow < 0 ? 'text-red-600' : 'text-green-600'}`}>
                        {formatCurrency(results.q50_netCashFlow)}
                      </span>
                      <p className="text-xs text-slate-600 mt-1">Receipts - Disbursements</p>
                    </div>
                    <div className="p-4 bg-indigo-50 rounded-lg border border-indigo-100">
                      <h4 className="font-bold text-slate-800 mb-1">51) Net Income (Variable Costing)</h4>
                      <span className={`text-lg font-bold ${results.q51_netIncome < 0 ? 'text-red-600' : 'text-indigo-600'}`}>
                        {formatCurrency(results.q51_netIncome)}
                      </span>
                      <p className="text-xs text-slate-600 mt-1">Sales - Var Exp. - Fixed Exp.</p>
                    </div>
                  </div>

                  {/* Q52 */}
                  <div className="p-4 bg-white rounded-lg border border-slate-200 shadow-sm">
                    <h4 className="font-bold text-slate-800 mb-3 flex items-center gap-2">
                      52) 3 Differences Between Net Income & Net Cash Flow
                    </h4>
                    <ul className="space-y-3">
                      <li className="flex gap-2 text-sm text-slate-700">
                        <ArrowRightIcon className="text-blue-500 shrink-0" size={16} />
                        <span><strong>Depreciation Expense ({formatCurrency(inputs.machineryDepr)}):</strong> Deducted from Net Income but is a non-cash expense, so it doesn't affect Cash Flow.</span>
                      </li>
                      <li className="flex gap-2 text-sm text-slate-700">
                        <ArrowRightIcon className="text-blue-500 shrink-0" size={16} />
                        <span><strong>Timing of Sales Collections:</strong> Net Income recognizes total sales ({formatCurrency(results.totalSales)}), but Cash Flow only recognizes the actual cash received this month ({formatCurrency(results.q42_cashReceipts)}).</span>
                      </li>
                      <li className="flex gap-2 text-sm text-slate-700">
                        <ArrowRightIcon className="text-blue-500 shrink-0" size={16} />
                        <span><strong>Dividends Paid ({formatCurrency(inputs.dividendsPaid)}):</strong> Reduces Cash Flow but is a distribution to owners, not an expense on the Income Statement.</span>
                      </li>
                      <li className="flex gap-2 text-sm text-slate-700">
                        <ArrowRightIcon className="text-blue-500 shrink-0" size={16} />
                        <span><strong>Inventory / Variable Costs mismatch:</strong> You produced {inputs.unitsProduced} units (requiring cash for materials/labor) but only expensed {inputs.unitsSold} units in Variable Costing Net Income.</span>
                      </li>
                    </ul>
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
