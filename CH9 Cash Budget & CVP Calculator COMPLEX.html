<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Cash Budget Calculator</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Development versions for running locally) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel to translate JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- INLINE ICONS ---
        const Calculator = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>
            </svg>
        );

        const Settings = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
            </svg>
        );

        const Info = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
        );

        const ArrowRight = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
            const [inputs, setInputs] = useState({
                produced: '', sold: '', price: '', pctCredit: '', pctCash: '',
                pctCreditCurrent: '', pctCreditLater: '', dmPerUnit: '', dlPerUnit: '',
                salesCostPerUnit: '', pctVarCurrent: '', pctVarNext: '', mfgSalaries: '',
                factoryRent: '', depreciation: '', sgaCosts: '', equipSale: '',
                begCash: '', minCash: '', interestRate: '', borrowIncrement: ''
            });

            const [showLogic, setShowLogic] = useState(false);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setInputs(prev => ({
                    ...prev,
                    [name]: value === '' ? '' : Number(value)
                }));
            };

            const vals = useMemo(() => {
                return Object.fromEntries(
                    Object.entries(inputs).map(([k, v]) => [k, Number(v) || 0])
                );
            }, [inputs]);

            const results = useMemo(() => {
                const totalSales = vals.sold * vals.price;
                const cashSalesAmount = totalSales * (vals.pctCash / 100);
                const creditSalesAmount = totalSales * (vals.pctCredit / 100);
                const creditCollectedCurrent = creditSalesAmount * (vals.pctCreditCurrent / 100);
                const totalCashReceipts = cashSalesAmount + creditCollectedCurrent + vals.equipSale;

                const q43_availableCash = vals.begCash + totalCashReceipts;

                const varMfgCosts = (vals.dmPerUnit + vals.dlPerUnit) * vals.produced;
                const varSalesCosts = vals.salesCostPerUnit * vals.sold;
                const totalVarCostsIncurred = varMfgCosts + varSalesCosts;
                
                const q44_varCashDisbursements = totalVarCostsIncurred * (vals.pctVarCurrent / 100);

                const fixedCashDisbursements = vals.mfgSalaries + vals.factoryRent + vals.sgaCosts;
                
                const q45_totalCashDisbursements = q44_varCashDisbursements + fixedCashDisbursements;

                const q46_endingCashBeforeFin = q43_availableCash - q45_totalCashDisbursements;

                let q47_borrowingRequired = 0;
                if (q46_endingCashBeforeFin < vals.minCash) {
                    q47_borrowingRequired = vals.minCash - q46_endingCashBeforeFin;
                }

                const monthlyInterestRate = (vals.interestRate / 100) / 12;
                const q48_interestOnRaw = q47_borrowingRequired * monthlyInterestRate;

                let q49_borrowingNeeded = 0;
                if (q47_borrowingRequired > 0) {
                    const exactBorrowingNeeded = q47_borrowingRequired / (1 - monthlyInterestRate);
                    const increment = vals.borrowIncrement || 1; 
                    q49_borrowingNeeded = Math.ceil(exactBorrowingNeeded / increment) * increment;
                }

                const q50_netCashFlow = totalCashReceipts - q45_totalCashDisbursements;

                const cvpSales = totalSales;
                const cvpVarMfg = (vals.dmPerUnit + vals.dlPerUnit) * vals.sold; 
                const cvpVarSales = vals.salesCostPerUnit * vals.sold;
                const contributionMargin = cvpSales - cvpVarMfg - cvpVarSales;
                const totalFixedCosts = vals.mfgSalaries + vals.factoryRent + vals.depreciation + vals.sgaCosts;
                const netOperatingIncome = contributionMargin - totalFixedCosts;

                const diffNetIncomeCashFlow = Math.abs(netOperatingIncome - q50_netCashFlow);

                return {
                    totalCashReceipts,
                    totalVarCostsIncurred,
                    fixedCashDisbursements,
                    monthlyInterestRate,
                    q43_availableCash,
                    q44_varCashDisbursements,
                    q45_totalCashDisbursements,
                    q46_endingCashBeforeFin,
                    q47_borrowingRequired,
                    q48_interestOnRaw,
                    q49_borrowingNeeded,
                    q50_netCashFlow,
                    netOperatingIncome,
                    diffNetIncomeCashFlow
                };
            }, [vals]);

            const formatCurrency = (val) => {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
            };

            return (
                <div className="min-h-screen text-slate-800 font-sans p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-slate-200 flex flex-col md:flex-row items-start md:items-center justify-between">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">
                                    <Calculator className="w-7 h-7 text-blue-600" />
                                    Cash Budget & CVP Calculator COMPLEX
                                </h1>
                                <p className="text-slate-500 mt-1">Easily swap numbers to solve similar accounting problems.</p>
                                <div className="mt-4 flex flex-col gap-2 items-start">
                                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-300 text-blue-900 px-4 py-2.5 rounded-lg shadow-sm font-semibold text-sm inline-flex items-center gap-3">
                                        <span className="bg-blue-200 text-blue-900 px-2.5 py-1 rounded text-xs font-black uppercase tracking-wider shadow-sm">Note</span>
                                        Correlates to problem stating 'Our Business needs...'
                                    </div>
                                    <div className="bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-amber-300 text-amber-900 px-4 py-2.5 rounded-lg shadow-sm font-semibold text-sm inline-flex items-center gap-3">
                                        <span className="bg-amber-300 text-amber-900 px-2.5 py-1 rounded text-xs font-black uppercase tracking-wider shadow-sm">Warning</span>
                                        Use for questions including a SALE OF EQUIPMENT
                                    </div>
                                </div>
                            </div>
                            <button 
                                onClick={() => setShowLogic(!showLogic)}
                                className="mt-4 md:mt-0 flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-lg font-medium hover:bg-blue-100 transition-colors"
                            >
                                <Info className="w-4 h-4" />
                                {showLogic ? "Hide Calculation Logic" : "Show Calculation Logic"}
                            </button>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* LEFT: INPUT FORM */}
                            <div className="lg:col-span-5 space-y-6 h-max">
                                <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-t-blue-600 border-x border-b border-slate-200">
                                    <h2 className="text-xl font-black text-slate-900 mb-6 flex items-center gap-2 border-b-2 border-slate-100 pb-3">
                                        <Settings className="w-6 h-6 text-blue-600" />
                                        Problem Variables
                                    </h2>
                                    
                                    <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                                        {/* Section 1 */}
                                        <div className="bg-blue-50/80 p-4 rounded-xl border border-blue-200">
                                            <h3 className="text-sm font-extrabold text-blue-900 uppercase tracking-wider mb-3">Volume & Sales</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-xs text-slate-800 font-bold">Units Produced</label><input type="number" name="produced" value={inputs.produced} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Units Sold</label><input type="number" name="sold" value={inputs.sold} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Price per Unit ($)</label><input type="number" name="price" value={inputs.price} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mt-3">
                                                <div><label className="text-xs text-slate-800 font-bold">% Credit Sales</label><input type="number" name="pctCredit" value={inputs.pctCredit} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">% Cash Sales</label><input type="number" name="pctCash" value={inputs.pctCash} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Credit Col. Current Mo (%)</label><input type="number" name="pctCreditCurrent" value={inputs.pctCreditCurrent} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Equip Sale Cash ($)</label><input type="number" name="equipSale" value={inputs.equipSale} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-all" /></div>
                                            </div>
                                        </div>

                                        {/* Section 2 */}
                                        <div className="bg-indigo-50/80 p-4 rounded-xl border border-indigo-200">
                                            <h3 className="text-sm font-extrabold text-indigo-900 uppercase tracking-wider mb-3">Variable Costs</h3>
                                            <div className="grid grid-cols-3 gap-4">
                                                <div><label className="text-xs text-slate-800 font-bold">Direct Mat ($)</label><input type="number" name="dmPerUnit" value={inputs.dmPerUnit} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Direct Lbr ($)</label><input type="number" name="dlPerUnit" value={inputs.dlPerUnit} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Sales Cost ($)</label><input type="number" name="salesCostPerUnit" value={inputs.salesCostPerUnit} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 focus:outline-none transition-all" /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mt-3">
                                                <div><label className="text-xs text-slate-800 font-bold">Var. Paid Current Mo (%)</label><input type="number" name="pctVarCurrent" value={inputs.pctVarCurrent} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 focus:outline-none transition-all" /></div>
                                            </div>
                                        </div>

                                        {/* Section 3 */}
                                        <div className="bg-emerald-50/80 p-4 rounded-xl border border-emerald-200">
                                            <h3 className="text-sm font-extrabold text-emerald-900 uppercase tracking-wider mb-3">Fixed Costs (Per Month)</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-xs text-slate-800 font-bold">Mfg Salaries ($)</label><input type="number" name="mfgSalaries" value={inputs.mfgSalaries} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Factory Rent ($)</label><input type="number" name="factoryRent" value={inputs.factoryRent} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Depreciation ($)</label><input type="number" name="depreciation" value={inputs.depreciation} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">SGA Costs ($)</label><input type="number" name="sgaCosts" value={inputs.sgaCosts} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 focus:outline-none transition-all" /></div>
                                            </div>
                                        </div>

                                        {/* Section 4 */}
                                        <div className="bg-amber-50/80 p-4 rounded-xl border border-amber-200">
                                            <h3 className="text-sm font-extrabold text-amber-900 uppercase tracking-wider mb-3">Cash & Financing Rules</h3>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-xs text-slate-800 font-bold">Beg. Cash Bal. ($)</label><input type="number" name="begCash" value={inputs.begCash} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-amber-500 focus:ring-2 focus:ring-amber-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Min. Cash Req. ($)</label><input type="number" name="minCash" value={inputs.minCash} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-amber-500 focus:ring-2 focus:ring-amber-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Annual Interest (%)</label><input type="number" name="interestRate" value={inputs.interestRate} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-amber-500 focus:ring-2 focus:ring-amber-200 focus:outline-none transition-all" /></div>
                                                <div><label className="text-xs text-slate-800 font-bold">Borrow Increment ($)</label><input type="number" name="borrowIncrement" value={inputs.borrowIncrement} onChange={handleInputChange} className="w-full mt-1.5 p-2 border-2 border-slate-300 rounded-lg bg-white text-sm font-bold text-slate-900 shadow-sm focus:border-amber-500 focus:ring-2 focus:ring-amber-200 focus:outline-none transition-all" /></div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>

                            {/* RIGHT: OUTPUT RESULTS */}
                            <div className="lg:col-span-7 space-y-4">
                                
                                <ResultCard 
                                    num={43} 
                                    title="Budgeted Available Cash" 
                                    value={formatCurrency(results.q43_availableCash)}
                                    showLogic={showLogic}
                                    logic={`Beg Cash (${formatCurrency(vals.begCash)}) + Cash Sales (${formatCurrency(vals.sold * vals.price * (vals.pctCash/100))}) + Credit Col. Current (${formatCurrency(vals.sold * vals.price * (vals.pctCredit/100) * (vals.pctCreditCurrent/100))}) + Equip Sale (${formatCurrency(vals.equipSale)}) = ${formatCurrency(results.q43_availableCash)}`}
                                />

                                <ResultCard 
                                    num={44} 
                                    title="Budgeted Variable Cash Disbursements" 
                                    value={formatCurrency(results.q44_varCashDisbursements)}
                                    showLogic={showLogic}
                                    logic={`[ (DM + DL) x Produced + (Sales Cost) x Sold ] * ${vals.pctVarCurrent}% = [ (${vals.dmPerUnit} + ${vals.dlPerUnit}) x ${vals.produced} + (${vals.salesCostPerUnit}) x ${vals.sold} ] * ${vals.pctVarCurrent/100} = ${formatCurrency(results.totalVarCostsIncurred)} * ${vals.pctVarCurrent/100} = ${formatCurrency(results.q44_varCashDisbursements)}`}
                                />

                                <ResultCard 
                                    num={45} 
                                    title="Budgeted Total Cash Disbursements" 
                                    value={formatCurrency(results.q45_totalCashDisbursements)}
                                    showLogic={showLogic}
                                    logic={`Variable Disbursements (${formatCurrency(results.q44_varCashDisbursements)}) + Fixed Disbursements [exclude Depreciation] (${formatCurrency(results.fixedCashDisbursements)}) = ${formatCurrency(results.q45_totalCashDisbursements)}`}
                                />

                                <ResultCard 
                                    num={46} 
                                    title="Budgeted Ending Cash (Before Financing)" 
                                    value={formatCurrency(results.q46_endingCashBeforeFin)}
                                    isNegative={results.q46_endingCashBeforeFin < 0}
                                    showLogic={showLogic}
                                    logic={`Available Cash (${formatCurrency(results.q43_availableCash)}) - Total Disbursements (${formatCurrency(results.q45_totalCashDisbursements)}) = ${formatCurrency(results.q46_endingCashBeforeFin)}`}
                                />

                                <ResultCard 
                                    num={47} 
                                    title="Amount of Financing Required (No Interest)" 
                                    value={formatCurrency(results.q47_borrowingRequired)}
                                    showLogic={showLogic}
                                    logic={`Min Cash Required (${formatCurrency(vals.minCash)}) - Ending Cash Before Fin (${formatCurrency(results.q46_endingCashBeforeFin)}) = ${formatCurrency(results.q47_borrowingRequired)}`}
                                />

                                <ResultCard 
                                    num={48} 
                                    title="Cost of Interest for One Month (on above amount)" 
                                    value={formatCurrency(results.q48_interestOnRaw)}
                                    showLogic={showLogic}
                                    logic={`Financing Amount (${formatCurrency(results.q47_borrowingRequired)}) x (${vals.interestRate}% / 12 months) = ${formatCurrency(results.q48_interestOnRaw)}`}
                                />

                                <div className="bg-blue-600 rounded-xl shadow-lg p-5 border border-blue-700 text-white transform transition-all hover:scale-[1.01]">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-white/20 px-3 py-1 rounded-md font-bold shrink-0">49</div>
                                        <h3 className="font-semibold text-lg leading-tight">Financing Needed (Including Interest & Increments)</h3>
                                    </div>
                                    <div className="mt-4 text-3xl font-bold tracking-tight">
                                        {formatCurrency(results.q49_borrowingNeeded)}
                                    </div>
                                    {showLogic && (
                                        <div className="mt-3 text-sm bg-blue-800/50 p-3 rounded-lg flex items-start gap-2">
                                            <ArrowRight className="w-4 h-4 mt-0.5 shrink-0" />
                                            <p>
                                                <strong>Logic:</strong> We need to borrow enough ($B) so that after paying 1 month interest on $B, we still have the shortfall covered.<br/>
                                                Needed = Shortfall / (1 - (Annual Rate / 12))<br/>
                                                Needed = {formatCurrency(results.q47_borrowingRequired)} / (1 - {(vals.interestRate/100/12).toFixed(4)}) = {formatCurrency(results.q47_borrowingRequired / (1-results.monthlyInterestRate))}<br/>
                                                Rounded up to nearest {formatCurrency(vals.borrowIncrement)} increment = <strong>{formatCurrency(results.q49_borrowingNeeded)}</strong>
                                            </p>
                                        </div>
                                    )}
                                </div>

                                <ResultCard 
                                    num={50} 
                                    title="Budgeted NET CASH FLOW" 
                                    value={formatCurrency(results.q50_netCashFlow)}
                                    isNegative={results.q50_netCashFlow < 0}
                                    showLogic={showLogic}
                                    logic={`Total Cash Receipts (${formatCurrency(results.totalCashReceipts)}) - Total Cash Disbursements (${formatCurrency(results.q45_totalCashDisbursements)}) = ${formatCurrency(results.q50_netCashFlow)}`}
                                />

                                <ResultCard 
                                    num={51} 
                                    title="Budgeted Net Income (Variable Costing CVP)" 
                                    value={formatCurrency(results.netOperatingIncome)}
                                    showLogic={showLogic}
                                    logic={`Sales (${formatCurrency(vals.sold * vals.price)}) - Variable Costs on UNITS SOLD (${formatCurrency( (vals.dmPerUnit+vals.dlPerUnit+vals.salesCostPerUnit) * vals.sold )}) - Total Fixed Costs [including Depreciation] (${formatCurrency(vals.mfgSalaries+vals.factoryRent+vals.depreciation+vals.sgaCosts)}) = Net Operating Income`}
                                />

                                <ResultCard 
                                    num="Δ" 
                                    title="Difference Between Net Income & Net Cash Flow" 
                                    value={formatCurrency(results.diffNetIncomeCashFlow)}
                                    showLogic={showLogic}
                                    logic={`| Budgeted Net Income (${formatCurrency(results.netOperatingIncome)}) - Budgeted Net Cash Flow (${formatCurrency(results.q50_netCashFlow)}) | = ${formatCurrency(results.diffNetIncomeCashFlow)}`}
                                />

                                {/* Q52 Manual Text Box */}
                                <div className="bg-white rounded-xl shadow-sm p-5 border-l-4 border-l-slate-800 border-t border-b border-r border-slate-200">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-slate-100 text-slate-700 px-3 py-1 rounded-md font-bold text-sm shrink-0">52</div>
                                        <h3 className="font-semibold text-slate-800">3 Specific Items Creating Differences</h3>
                                    </div>
                                    <div className="mt-3 text-slate-700 text-sm space-y-2 pl-2">
                                        <p><strong>1. Depreciation Expense:</strong> Deducted to find Net Income (${formatCurrency(vals.depreciation)}), but does not consume any cash flow.</p>
                                        <p><strong>2. Production vs. Sales Volume mismatch:</strong> We produced {vals.produced || 0} units (paying for materials/labor) but only sold {vals.sold || 0} units, creating a cash drain not yet shown as an expense in CVP.</p>
                                        <p><strong>3. Timing of Cash Collections:</strong> We recorded full sales revenue (${formatCurrency(vals.sold * vals.price)}), but only collected a fraction (${formatCurrency(results.totalCashReceipts - vals.equipSale)}) this month.</p>
                                        <p className="text-xs text-slate-400 italic pt-2">*Bonus 4th item: Equipment Sale increases cash but only the gain/loss affects Net income.</p>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- RESUABLE RESULT CARD COMPONENT ---
        function ResultCard({ num, title, value, logic, showLogic, isNegative = false }) {
            return (
                <div className={`bg-white rounded-xl shadow-sm p-4 border-l-4 ${isNegative ? 'border-l-red-500' : 'border-l-green-500'} border-t border-b border-r border-slate-200 hover:shadow-md transition-shadow`}>
                    <div className="flex items-center justify-between gap-4 flex-wrap">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-100 text-slate-700 px-3 py-1 rounded-md font-bold text-sm shrink-0">{num}</div>
                            <h3 className="font-semibold text-slate-800">{title}</h3>
                        </div>
                        <div className={`text-xl font-bold ${isNegative ? 'text-red-600' : 'text-slate-900'}`}>
                            {value}
                        </div>
                    </div>
                    {showLogic && logic && (
                        <div className="mt-3 text-sm text-slate-600 bg-slate-50 p-3 rounded border border-slate-100">
                            <strong>Formula:</strong> {logic}
                        </div>
                    )}
                </div>
            );
        }

        // --- RENDER APP TO DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
